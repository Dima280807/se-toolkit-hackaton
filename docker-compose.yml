services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: url_shortener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/001_urls.sql:/docker-entrypoint-initdb.d/001_urls.sql
      - ./backend/migrations/002_custom_codes_and_expiration.sql:/docker-entrypoint-initdb.d/002_custom_codes_and_expiration.sql
      - ./backend/migrations/003_fix_short_code_length.sql:/docker-entrypoint-initdb.d/003_fix_short_code_length.sql

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: url_shortener
      DB_USER: postgres
      DB_PASSWORD: postgres
      BASE_URL: ${BASE_URL:-http://localhost:5000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      - db

volumes:
  postgres_data:
